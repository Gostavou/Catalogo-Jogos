<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar jogo</title>
    <link rel="stylesheet" href="../css/atualizar.css">
</head>
<body>

    <div class="form-container">

        <h2>Atualizar jogo</h2>

        <form
            id="formAtualizar"
            action="../back/atualizar.php"
            method="POST"
            enctype="multipart/form-data"
        >

            <input
                type="hidden"
                name="id"
                id="idAtualizar"
            >

            <div class="input-group">

                <label>Nome:</label>

                <input
                    type="text"
                    name="nome"
                    id="nomeAtualizar"
                >

            </div>

            <div class="input-group">

                <label>Desenvolvedora:</label>

                <input
                    type="text"
                    name="desenvolvedora"
                    id="desenvolvedoraAtualizar"
                >

            </div>

            <div class="input-group">

                <label>Gêneros:</label>

                <div
                    class="chips-container"
                    id="chipsContainer"
                >

                    <div class="chip">Ação</div>
                    <div class="chip">RPG</div>
                    <div class="chip">Aventura</div>
                    <div class="chip">Terror</div>
                    <div class="chip">Survival</div>
                    <div class="chip">FPS</div>
                    <div class="chip">Mundo Aberto</div>
                    <div class="chip">Puzzle</div>
                    <div class="chip">Corrida</div>
                    <div class="chip">Luta</div>
                    <div class="chip">Hack and Slash</div>
                    <div class="chip">Soulslike</div>
                    <div class="chip">Estratégia</div>
                    <div class="chip">Simulação</div>

                </div>

            </div>

            <div class="input-group">

                <label>Adicionar gênero:</label>

                <div class="add-genero">

                    <input
                        type="text"
                        id="novoGenero"
                        placeholder="Novo gênero"
                    >

                    <button
                        type="button"
                        id="btnAdicionarGenero"
                    >
                        +
                    </button>

                </div>

            </div>

            <input
                type="hidden"
                name="genero"
                id="generoFinal"
            >

            <div class="input-group">

                <label>Nota:</label>

                <input
                    type="number"
                    min="0"
                    max="5"
                    step="0.1"
                    name="nota"
                    id="notaAtualizar"
                >

            </div>

            <div class="input-group">

                <label>Plataforma:</label>

                <select id="plataformaSelect">

                    <option value="PC">PC</option>
                    <option value="PlayStation">PlayStation</option>
                    <option value="Xbox">Xbox</option>
                    <option value="Nintendo">Nintendo</option>
                    <option value="Outro">Outro</option>

                </select>

            </div>

            <div
                class="input-group"
                id="outraPlataformaGroup"
                style="display: none;"
            >

                <label>Outra plataforma:</label>

                <input
                    type="text"
                    id="outraPlataforma"
                >

            </div>

            <input
                type="hidden"
                name="plataforma"
                id="plataformaFinal"
            >

            <div class="input-group">

                <label>Capa do jogo:</label>

                <input
                    type="file"
                    name="capa"
                    id="capaAtualizar"
                    accept="image/*"
                >

            </div>

            <div class="input-group">

                <label>Status:</label>

                <select
                    name="status_jogo"
                    id="statusAtualizar"
                >

                    <option value="Jogando">
                        Jogando
                    </option>

                    <option value="Joguei">
                        Joguei
                    </option>

                    <option value="Backlogged">
                        Backlogged
                    </option>

                    <option value="Wishlist">
                        Wishlist
                    </option>

                </select>

            </div>

            <div class="form-actions">

                <button type="submit">
                    Atualizar
                </button>

                <button
                    type="button"
                    onclick="window.location.href='../index.html'"
                >
                    Cancelar
                </button>

            </div>

        </form>

    </div>

    <script src="atualizar.js"></script>

</body>
</html>
