<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="form-container">
        <h2>Atualizar usuario</h2>
        <form id="formAtualizar" action="../back/atualizar.php" method="POST">
            <input type="hidden" name="id" id="idAtualizar">

            <div class="input-group">
                <label>Nome:</label>
                <input type="text" name="nome" id="nomeAtualizar" required>
            </div>
            <div class="input-group">
                <label>Email:</label>
                <input type="email" name="email" id="emailAtualizar" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">Atualizar dados</button>
                <button
                type="button"
                class="btn-secondary"
                onclick="window.location.href = '../index.html'">
            Cancelar
        </button>
            </div>
        </form>
    </div>

    <script src="atualizar.js"></script>
</body>
</html>
